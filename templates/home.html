<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <style>
        body {
            height: 80vh;
            display: flex;
            justify-content: center;
        }
        
        #container {
            height: 80%;
            width: 25%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid white;
            border-radius: 20px;
            background: rgb(33, 62, 108);
        }

        #title {
            color: white;
            margin: 15px;
        }

        ul{
            padding-inline-start: 0px !important;
        }

        li {
            text-decoration: none;
            list-style: none;
            color: #1e293b;
        }

        .card {
            padding: 15px;
            border: 1px solid white;
            width: fit-content;
            border-radius: 10px;
            background: #7575ff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            margin: 15px;
        }

        a {
            text-decoration: none;
        }

        button {
            border: none;
            background: #3e3ede;
            color: white;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        form{
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 15px;
        }

        form input{
            width: fit-content;
            margin: 5px;
        }
        form button{
            width: fit-content;
            margin: 5px;
        }
    </style>
</head>

<body>
    <div id="container">
        <h3 id="title">To-Do-List</h3>
        <form action="/add" method="post">
            <input type="text" name="task" placeholder="Enter a new task" required>
            <input type="date" name="deadline" placeholder="Enter your deadline" required>
            <button type="submit">Add Task</button>
        </form>
        <ul>
            {% for task in tasks %}
            <div class="card">
                <li>Task Name: {{ task.task }}</li>
                <li>Deadline: {{ task.deadline }}</li>
                <li>Status: {{ task.status }}</li>
                <a href="{{ url_for('edit', id=task._id) }}">
                    <button>Edit</button>
                </a>
                <a href="{{ url_for('delete', id=task._id) }}">
                    <button>Delete</button>
                </a>
            </div>
            {% endfor %}
        </ul>
    </div>

</body>

</html>
