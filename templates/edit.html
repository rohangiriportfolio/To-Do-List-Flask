<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="container">
        <h3 id="title">To-Do List</h3>
        <div class="page">

            <h5 id="sub-title">Edit Task</h5>
            <form class="edit-form" action="{{ url_for('update', id=task._id) }}" method="POST">
                <input type="text" name="task" value="{{ task.task }}" placeholder="Task name" required>
                <input type="date" name="deadline" value="{{ task.deadline }}" required>
                <select name="status" required>
                    <option value="active" {% if task.status == 'active' %}selected{% endif %}>Active</option>
                    <option value="inactive" {% if task.status == 'inactive' %}selected{% endif %}>Inactive</option>
                </select>
                <button type="submit">Update Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
