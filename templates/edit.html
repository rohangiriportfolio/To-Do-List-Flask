<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #title {
            color: white;
            margin: 15px;
        }
        #container {
            height: 80%;
            width: 35%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid white;
            border-radius: 20px;
            background: rgb(33, 62, 108);
        }
        form{
            display: flex;
            flex-direction: row;
            justify-content: center;
            margin: 15px;
        }
        form input{
            width: fit-content;
            margin: 5px;
        }
        form button{
            width: fit-content;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="container">

        <h3 id="title">Edit Task</h3>
        <form action="{{ url_for('update', id=task._id) }}" method="POST">
        <input type="text" name="task" value="{{ task.task }}">
        <input type="date" name="deadline" value="{{ task.deadline }}">
        <select name="status">
            <option value="active" {% if task.status == 'active' %}selected{% endif %}>
                Active
            </option>
            <option value="inactive" {% if task.status == 'inactive' %}selected{% endif %}>
                Inactive
            </option>
        </select>
    
        <button type="submit">Save</button>
    </div>
</form>
</body>
</html>
